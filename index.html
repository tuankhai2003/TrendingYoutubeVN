```html
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Hình AR - Đã Fix Kích Thước & Giao Diện AR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Màu nền mặc định khi ở chế độ 3D máy tính */
            background-color: #1a1a1a; 
            transition: background-color 0.3s ease;
        }
        /* KHI VÀO AR: Bắt buộc nền phải trong suốt để thấy Camera */
        body.in-ar {
            background-color: transparent !important;
        }
        
        #ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .control-group label {
            font-weight: bold;
            color: #333;
            width: 70px;
            font-size: 14px;
        }
        .control-group input[type="range"] {
            flex-grow: 1;
            margin: 0 10px;
        }
        .control-group .value-display {
            width: 30px;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
        }
        #valX { color: #ff0000; }
        #valY { color: #00aa00; }
        #valZ { color: #0000ff; }
        hr { border: none; border-top: 1px solid #ddd; margin: 5px 0; }
        
        #instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            z-index: 1000;
        }
        /* Ẩn bảng hướng dẫn khi vào AR cho gọn màn hình */
        body.in-ar #instruction {
            display: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="instruction">
        👉 Dùng chuột để xoay / phóng to.<br>
        👉 Bấm <b>"ENTER AR"</b> để xem ngoài đời thực.<br>
        <i>(Mô hình sẽ tự động xuất hiện phía trước bạn 1 mét)</i>
    </div>

    <div id="ui-panel">
        <div style="text-align: center; font-weight: bold; margin-bottom: 5px;">Điều chỉnh kích thước (1-10)</div>
        <div class="control-group">
            <label style="color: red;">Trục X:</label>
            <input type="range" id="sizeX" min="1" max="10" step="0.5" value="2">
            <span class="value-display" id="valX">2</span>
        </div>
        <div class="control-group">
            <label style="color: green;">Trục Y:</label>
            <input type="range" id="sizeY" min="1" max="10" step="0.5" value="2">
            <span class="value-display" id="valY">2</span>
        </div>
        <div class="control-group">
            <label style="color: blue;">Trục Z:</label>
            <input type="range" id="sizeZ" min="1" max="10" step="0.5" value="2">
            <span class="value-display" id="valZ">2</span>
        </div>
        <hr>
        <div class="control-group">
            <label>Gập / Mở:</label>
            <input type="range" id="foldProgress" min="0" max="1" step="0.01" value="1">
            <span class="value-display"></span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. CÀI ĐẶT SCENE
        // ==========================================
        const scene = new THREE.Scene();
        // Đảm bảo không có màu nền của scene đè lên camera AR
        scene.background = null; 

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.05, 100);
        camera.position.set(8, 6, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setClearColor(0x000000, 0); // Background trong suốt hoàn toàn
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true; 
        document.body.appendChild(renderer.domElement);

        // THÊM DOM OVERLAY: Giữ lại giao diện HTML (bảng thanh trượt) khi vào AR
        const arOptions = {
            requiredFeatures: ['dom-overlay'],
            domOverlay: { root: document.body }
        };
        const arButton = ARButton.createButton(renderer, arOptions);
        document.body.appendChild(arButton);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // Group chính chứa mọi thứ
        const mainGroup = new THREE.Group();
        mainGroup.position.set(0, -1, -3); 
        scene.add(mainGroup);

        // --- XỬ LÝ SỰ KIỆN KHI VÀO/THOÁT AR ---
        renderer.xr.addEventListener('sessionstart', () => {
            // Thêm class in-ar để CSS làm trong nền trang web
            document.body.classList.add('in-ar');
            
            // Thu nhỏ 10 lần (1 đơn vị = 10cm)
            mainGroup.scale.set(0.1, 0.1, 0.1);
            
            // Đặt gốc tọa độ ngay trước mặt (Z = -1m), hơi thấp xuống (Y = -0.3m)
            mainGroup.position.set(0, -0.3, -1);
            
            // Tắt OrbitControls trong môi trường AR
            controls.enabled = false;
        });

        renderer.xr.addEventListener('sessionend', () => {
            // Trả lại nền tối
            document.body.classList.remove('in-ar');
            
            // Trả lại kích thước và vị trí ban đầu cho màn hình desktop
            mainGroup.scale.set(1, 1, 1);
            mainGroup.position.set(0, -1, -3);
            
            // Bật lại OrbitControls
            controls.enabled = true;
            controls.target.set(0, 0, 0);
        });

        // ==========================================
        // 2. TẠO HỆ TRỤC TỌA ĐỘ VÀ SỐ (CÓ PHẦN ÂM)
        // ==========================================
        function createAxisLine(color, posLength, negLength, axis) {
            const material = new THREE.LineBasicMaterial({ color: color, linewidth: 3 });
            const points = [];
            if(axis === 'x') { points.push(new THREE.Vector3(-negLength, 0, 0)); points.push(new THREE.Vector3(posLength, 0, 0)); }
            if(axis === 'y') { points.push(new THREE.Vector3(0, 0, 0)); points.push(new THREE.Vector3(0, posLength, 0)); }
            if(axis === 'z') { points.push(new THREE.Vector3(0, 0, -negLength)); points.push(new THREE.Vector3(0, 0, posLength)); }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            return new THREE.Line(geometry, material);
        }

        mainGroup.add(createAxisLine(0xff5555, 11, 10, 'x'));
        mainGroup.add(createAxisLine(0x55ff55, 11, 0, 'y'));
        mainGroup.add(createAxisLine(0x5555ff, 11, 10, 'z'));

        function createTextSprite(text, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; 
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false }));
            sprite.scale.set(0.8, 0.4, 0.4); 
            return sprite;
        }

        for (let i = -10; i <= 10; i++) {
            if (i === 0) continue;
            const sx = createTextSprite(i.toString(), '#ffaaaa'); sx.position.set(i, -0.3, 0); mainGroup.add(sx);
            const sz = createTextSprite(i.toString(), '#aaaaff'); sz.position.set(0, -0.3, i); mainGroup.add(sz);
            if (i > 0) {
                const sy = createTextSprite(i.toString(), '#aaffaa'); sy.position.set(-0.4, i, 0); mainGroup.add(sy);
            }
        }

        // ==========================================
        // 3 & 4. CƠ CHẾ HỘP GẬP MỞ 
        // ==========================================
        const boxContainer = new THREE.Group();
        mainGroup.add(boxContainer);
        const faces = {}; 

        function createFlatFace(width, depth, color) {
            const geometry = new THREE.PlaneGeometry(width, depth);
            const material = new THREE.MeshStandardMaterial({ 
                color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.9 
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = -Math.PI / 2;
            const edges = new THREE.LineSegments(
                new THREE.EdgesGeometry(geometry),
                new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 })
            );
            mesh.add(edges);
            return mesh;
        }

        function rebuildBox() {
            while(boxContainer.children.length > 0) boxContainer.remove(boxContainer.children[0]);

            const X = parseFloat(document.getElementById('sizeX').value);
            const Y = parseFloat(document.getElementById('sizeY').value);
            const Z = parseFloat(document.getElementById('sizeZ').value);

            const assembly = new THREE.Group();
            assembly.position.set(X/2, 0, Z/2);
            boxContainer.add(assembly);

            const bottom = createFlatFace(X, Z, 0x8B4513); assembly.add(bottom);

            faces.right = { hinge: new THREE.Group() }; faces.right.hinge.position.set(X/2, 0, 0);
            const rightMesh = createFlatFace(Y, Z, 0xD2691E); rightMesh.position.set(Y/2, 0, 0);
            faces.right.hinge.add(rightMesh); assembly.add(faces.right.hinge);

            faces.left = { hinge: new THREE.Group() }; faces.left.hinge.position.set(-X/2, 0, 0);
            const leftMesh = createFlatFace(Y, Z, 0xCD853F); leftMesh.position.set(-Y/2, 0, 0);
            faces.left.hinge.add(leftMesh); assembly.add(faces.left.hinge);

            faces.front = { hinge: new THREE.Group() }; faces.front.hinge.position.set(0, 0, Z/2);
            const frontMesh = createFlatFace(X, Y, 0xDAA520); frontMesh.position.set(0, 0, Y/2);
            faces.front.hinge.add(frontMesh); assembly.add(faces.front.hinge);

            faces.back = { hinge: new THREE.Group() }; faces.back.hinge.position.set(0, 0, -Z/2);
            const backMesh = createFlatFace(X, Y, 0xB8860B); backMesh.position.set(0, 0, -Y/2);
            faces.back.hinge.add(backMesh); assembly.add(faces.back.hinge);

            faces.top = { hinge: new THREE.Group() }; faces.top.hinge.position.set(-Y, 0, 0);
            const topMesh = createFlatFace(X, Z, 0xF4A460); topMesh.position.set(-X/2, 0, 0);
            faces.top.hinge.add(topMesh); faces.left.hinge.add(faces.top.hinge);

            updateFold();
        }

        function updateFold() {
            const p = parseFloat(document.getElementById('foldProgress').value);
            if(faces.right) faces.right.hinge.rotation.z = p * (Math.PI / 2);
            if(faces.left)  faces.left.hinge.rotation.z = p * (-Math.PI / 2);
            if(faces.front) faces.front.hinge.rotation.x = p * (-Math.PI / 2);
            if(faces.back)  faces.back.hinge.rotation.x = p * (Math.PI / 2);
            if(faces.top)   faces.top.hinge.rotation.z = p * (-Math.PI / 2);
        }

        ['sizeX', 'sizeY', 'sizeZ'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                document.getElementById('val' + id.slice(-1)).innerText = e.target.value;
                rebuildBox();
            });
        });

        document.getElementById('foldProgress').addEventListener('input', updateFold);

        rebuildBox();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        renderer.setAnimationLoop(() => {
            if (!renderer.xr.isPresenting && controls.enabled) {
                controls.update();
            }
            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
