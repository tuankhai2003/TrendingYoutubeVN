<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending YouTube VN</title>
    
    <!-- Load Google Fonts (K2D & Readex Pro) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=K2D:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Load React -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js" crossorigin="anonymous"></script>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cấu hình Tailwind cho Font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Readex Pro"', 'sans-serif'],
                        k2d: ['"K2D"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0a0f1c] text-white font-sans selection:bg-red-500/30">
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #9ca3af; font-family: 'Readex Pro', sans-serif;">
            Đang khởi tạo ứng dụng...
        </div>
    </div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // QUAN TRỌNG: DÁN API KEY CỦA BẠN VÀO ĐÂY
        // ==========================================
        const YOUTUBE_API_KEY = "AIzaSyDVA2MLzQeEs-D0Mg6whtEgGsVMF76XDOY"; 
        
        // Icon Components
        const PlayIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="6 3 20 12 6 21 6 3"/></svg>;
        const XIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const YoutubeIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2.5 7.1C2.6 5.9 3.4 5.1 4.5 5 8.1 4.7 12 4.7 15.5 5c1.1.1 1.9.9 2 2.1.2 1.6.2 3.2 0 4.8-.1 1.2-.9 2-2 2.1-3.5.3-7.4.3-11 .1-1.1-.1-1.9-.9-2-2.1-.2-1.6-.2-3.2 0-4.8Z"/><path fill="white" stroke="white" d="m9.5 14.5 6-4-6-4v8Z"/></svg>;

        const formatViews = (views) => {
            if (!views) return "0";
            const num = parseInt(views);
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
            return num.toString();
        };

        const timeSince = (dateString) => {
            const date = new Date(dateString);
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " năm trước";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " tháng trước";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " ngày trước";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " giờ trước";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " phút trước";
            return Math.floor(seconds) + " giây trước";
        };

        function App() {
            const [activeTab, setActiveTab] = useState('all');
            const [videos, setVideos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [loadingMore, setLoadingMore] = useState(false);
            const [error, setError] = useState(null);
            const [playingVideo, setPlayingVideo] = useState(null);
            const [nextPageToken, setNextPageToken] = useState(null);
            
            // Dùng ref để chống lỗi stale state (trạng thái cũ) khi cuộn
            const tokenRef = useRef(null);
            const loadingMoreRef = useRef(false);
            const observerTarget = useRef(null);

            const categories = {
                'all': '',
                'music': '10',
                'news': '25',
                'entertainment': '24'
            };

            const tabs = [
                { id: 'all', label: 'TỔNG HỢP' },
                { id: 'music', label: 'ÂM NHẠC' },
                { id: 'news', label: 'TIN TỨC' },
                { id: 'entertainment', label: 'GIẢI TRÍ' },
            ];

            const fetchTrending = async (isLoadMore = false) => {
                if (isLoadMore) {
                    if (!tokenRef.current || loadingMoreRef.current) return;
                    setLoadingMore(true);
                    loadingMoreRef.current = true;
                } else {
                    setLoading(true);
                    setVideos([]);
                    setNextPageToken(null);
                    tokenRef.current = null;
                }
                setError(null);

                if (YOUTUBE_API_KEY === "DÁN_API_KEY_CỦA_BẠN_VÀO_ĐÂY" || !YOUTUBE_API_KEY) {
                    setError("Vui lòng nhập YOUTUBE_API_KEY hợp lệ.");
                    setLoading(false);
                    return;
                }

                try {
                    const categoryParam = categories[activeTab] ? `&videoCategoryId=${categories[activeTab]}` : '';
                    const tokenParam = (isLoadMore && tokenRef.current) ? `&pageToken=${tokenRef.current}` : '';
                    
                    // Nâng maxResults lên 50 (mức tối đa của YouTube) để lấy nhiều nhất có thể mỗi lần
                    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=VN&maxResults=50${categoryParam}${tokenParam}&key=${YOUTUBE_API_KEY}`;
                    
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.error) throw new Error(data.error.message);

                    const formattedVideos = data.items.map(item => ({
                        // Đảm bảo ID duy nhất cho React Key kể cả khi YouTube trả trùng lặp ở biên trang
                        uniqueKey: item.id + '-' + Math.random().toString(36).substr(2, 9),
                        youtubeId: item.id,
                        title: item.snippet.title,
                        channel: item.snippet.channelTitle,
                        views: formatViews(item.statistics.viewCount),
                        timeAgo: timeSince(item.snippet.publishedAt),
                        thumbnail: item.snippet.thumbnails.maxres?.url || item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url
                    }));

                    if (isLoadMore) {
                        setVideos(prev => [...prev, ...formattedVideos]);
                    } else {
                        setVideos(formattedVideos);
                    }
                    
                    const nextToken = data.nextPageToken || null;
                    setNextPageToken(nextToken);
                    tokenRef.current = nextToken;

                } catch (err) {
                    setError("Lỗi lấy dữ liệu: " + err.message);
                } finally {
                    setLoading(false);
                    setLoadingMore(false);
                    loadingMoreRef.current = false;
                }
            };

            // Gọi API khi đổi Tab
            useEffect(() => {
                fetchTrending(false);
            }, [activeTab]);

            // Thiết lập Intersection Observer để cuộn vô hạn
            useEffect(() => {
                const observer = new IntersectionObserver(
                    entries => {
                        // Nếu thẻ div ở cuối trang xuất hiện vào khung hình -> Tải thêm
                        if (entries[0].isIntersecting && tokenRef.current && !loadingMoreRef.current) {
                            fetchTrending(true);
                        }
                    },
                    { threshold: 0.1 }
                );

                if (observerTarget.current) {
                    observer.observe(observerTarget.current);
                }

                return () => {
                    if (observerTarget.current) observer.unobserve(observerTarget.current);
                };
            }, [activeTab]); // Reset observer mỗi khi đổi tab

            return (
                <div className="pb-10">
                    <header className="sticky top-0 z-40 bg-[#111827] border-b border-gray-800 shadow-lg py-3">
                        <div className="max-w-6xl mx-auto px-4 flex items-center">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => {setActiveTab('all');}}>
                                <YoutubeIcon size={42} className="text-red-500 group-hover:scale-105 transition-transform" />
                                <div className="flex flex-col">
                                    <span className="font-bold text-xl tracking-tight text-white leading-tight font-k2d">Trending YouTube</span>
                                    <span className="text-xs text-gray-400 font-medium">Xu hướng YouTube Việt Nam</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-6">
                        {/* Tabs */}
                        <div className="flex items-center gap-2 overflow-x-auto pb-4 scrollbar-hide mb-4 border-b border-gray-800">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`whitespace-nowrap px-5 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 font-k2d tracking-wide ${
                                        activeTab === tab.id 
                                            ? 'bg-red-600 text-white shadow-lg shadow-red-500/20' 
                                            : 'bg-[#1e293b] text-gray-400 hover:bg-gray-700 hover:text-white'
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Status Messages */}
                        {loading && <div className="text-center py-20 text-gray-400 font-medium animate-pulse">Đang tải dữ liệu từ YouTube...</div>}
                        {error && (
                            <div className="bg-red-900/50 border border-red-500 text-red-200 p-6 rounded-lg text-center max-w-2xl mx-auto mt-10">
                                <h3 className="font-bold text-lg mb-2 font-k2d">⚠️ Lỗi kết nối API</h3>
                                <p>{error}</p>
                            </div>
                        )}

                        {/* Video List */}
                        {!loading && !error && (
                            <div className="bg-[#111827] rounded-xl border border-gray-800 overflow-hidden shadow-xl">
                                <div className="grid grid-cols-[50px_1fr] sm:grid-cols-[70px_1fr] gap-4 p-4 border-b border-gray-800 bg-[#0f1523] text-xs font-semibold text-gray-500 tracking-wider">
                                    <div className="text-center">HẠNG</div>
                                    <div>NỘI DUNG THỰC TẾ</div>
                                </div>
                                
                                <div className="divide-y divide-gray-800/50">
                                    {videos.map((video, index) => {
                                        const rankColor = index < 3 ? 'text-red-500' : 'text-gray-500';
                                        
                                        return (
                                            <div 
                                                key={video.uniqueKey} 
                                                onClick={() => setPlayingVideo(video)}
                                                className="grid grid-cols-[50px_1fr] sm:grid-cols-[70px_1fr] gap-2 sm:gap-4 p-4 sm:p-5 hover:bg-[#1e293b]/60 transition-colors cursor-pointer group items-center"
                                            >
                                                {/* Khu vực Đánh số (Chỉ hiển thị Top 20) */}
                                                <div className="text-center flex justify-center items-center">
                                                    {index < 20 ? (
                                                        <span className={`text-3xl sm:text-4xl font-black italic font-k2d ${rankColor}`}>
                                                            {index + 1}
                                                        </span>
                                                    ) : (
                                                        <span className="text-gray-700/50 font-black text-xl">-</span>
                                                    )}
                                                </div>

                                                <div className="flex flex-col sm:flex-row gap-4">
                                                    <div className="relative w-full sm:w-56 aspect-video rounded-lg overflow-hidden shrink-0 bg-gray-800 border border-gray-700">
                                                        <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"/>
                                                        <div className="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition-colors" />
                                                        <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <div className="bg-red-600/90 text-white p-3 rounded-full backdrop-blur-sm shadow-lg transform scale-90 group-hover:scale-100 transition-transform">
                                                                <PlayIcon size={20} className="ml-1" />
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-col justify-center flex-1 min-w-0 py-1">
                                                        <h3 className="text-sm sm:text-base font-bold text-gray-100 mb-2 line-clamp-2 group-hover:text-red-400 transition-colors leading-snug font-k2d">
                                                            {video.title}
                                                        </h3>
                                                        <p className="text-gray-400 text-xs sm:text-sm font-medium mb-1">{video.channel}</p>
                                                        <div className="flex items-center gap-2 text-[11px] sm:text-xs text-gray-500">
                                                            <span>{video.views} lượt xem</span>
                                                            <span>•</span>
                                                            <span>{video.timeAgo}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        
                        {/* Loading Spinner cho chế độ cuộn vô hạn */}
                        <div ref={observerTarget} className="py-6 flex justify-center">
                            {loadingMore && (
                                <div className="text-gray-400 animate-pulse font-medium text-sm flex items-center gap-2">
                                    <svg className="animate-spin h-5 w-5 text-red-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                    Đang tải thêm nội dung...
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal Player */}
                    {playingVideo && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center px-4 bg-black/95 backdrop-blur-sm">
                            <button onClick={() => setPlayingVideo(null)} className="absolute top-4 right-4 sm:top-6 sm:right-6 p-2 bg-gray-800 hover:bg-red-600 text-white rounded-full transition-colors z-50">
                                <XIcon size={24} />
                            </button>
                            <div className="w-full max-w-5xl bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-800">
                                <div className="relative w-full aspect-video bg-gray-900">
                                    <iframe className="absolute top-0 left-0 w-full h-full" src={`https://www.youtube.com/embed/${playingVideo.youtubeId}?autoplay=1`} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                                </div>
                                <div className="p-4 sm:p-6 bg-[#111827]">
                                    <h2 className="text-lg sm:text-xl font-bold text-white mb-2 line-clamp-2 font-k2d">{playingVideo.title}</h2>
                                    <div className="flex items-center gap-3">
                                        <div>
                                            <p className="font-semibold text-gray-200">{playingVideo.channel}</p>
                                            <p className="text-xs text-gray-400">{playingVideo.views} lượt xem</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
